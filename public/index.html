<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Product Authenticity Checker</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet" />

    <!-- Material Icons -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />

    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen;
            background: linear-gradient(to right top, #f5f7fa, #c3cfe2);
            margin: 0;
            padding: 2rem;
            min-height: 100vh;
        }

        .container {
            max-width: 800px;
            margin: auto;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 20px;
            padding: 2rem;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(10px);
        }

        h1 {
            text-align: center;
            font-weight: 600;
            margin-bottom: 1.5rem;
            color: #2c3e50;
        }

        .form-control {
            border-radius: 12px;
            border: 1px solid #dee2e6;
        }

        .btn {
            border-radius: 12px;
            font-weight: 500;
        }

        .card {
            border-radius: 14px;
            padding: 1rem;
            margin-bottom: 1rem;
            background: #ffffff;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.05);
        }

        .btn-icon {
            border: none;
            background: transparent;
            color: #555;
        }

        pre {
            background: #1e1e1e;
            color: #00ff90;
            padding: 1rem;
            border-radius: 10px;
            overflow-x: auto;
        }

        .auth-buttons {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 999;
        }

        .auth-buttons button {
            margin-left: 10px;
            border-radius: 12px;
        }
    </style>
</head>
<body>
<!-- Auth Buttons -->
<div class="auth-buttons">
    <button class="btn btn-outline-primary" onclick="window.location.href='/login'">Login</button>
    <button class="btn btn-primary" onclick="window.location.href='/register'">Register</button>
</div>

<div class="container">
    <h1>🧾 Product Checker</h1>

    <!-- Barcode input -->
    <div class="mb-3">
        <label for="barcodeInput" class="form-label">Enter Barcode</label>
        <input type="text" id="barcodeInput" class="form-control" placeholder="e.g., 1234567890123">
    </div>

    <!-- Image input -->
    <div class="mb-3">
        <label for="imageInput" class="form-label">Upload Image</label>
        <input type="file" id="imageInput" class="form-control" accept="image/*">
    </div>

    <!-- Action buttons -->
    <div class="d-flex justify-content-between mb-3">
        <button class="btn btn-primary" onclick="checkProduct()">Check Product</button>
        <button class="btn btn-outline-secondary" onclick="extractBarcode()">Extract From Image</button>
    </div>

    <!-- Result -->
    <pre id="result">Result will appear here...</pre>

    <!-- History -->
    <div class="history mt-4">
        <h4 class="mb-3">📜 Check History</h4>
        <div id="historyList"></div>
    </div>
</div>

<!-- Tesseract.js for OCR -->
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@2/dist/tesseract.min.js"></script>
<script>
    async function checkProduct(barcodeOverride = null) {
        const barcode = barcodeOverride || document.getElementById('barcodeInput').value;
        if (!barcode) {
            alert("Please enter or extract a barcode");
            return;
        }

        const response = await fetch('/api/check-product', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ barcode })
        });
        const data = await response.json();
        document.getElementById('result').innerText = JSON.stringify(data, null, 2);
        loadHistory();
    }

    async function loadHistory() {
        const response = await fetch('/api/history');
        const data = await response.json();
        const container = document.getElementById('historyList');
        container.innerHTML = '';

        data.forEach(item => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
          <div><strong>Barcode:</strong> ${item.barcode}</div>
          <div><strong>Country:</strong> ${item.country}</div>
          <div><strong>Original:</strong> ${item.is_original}</div>
          <div><strong>Checked At:</strong> ${new Date(item.checked_at).toLocaleString()}</div>
          <div class="mt-2 d-flex gap-2">
            <button class="btn btn-outline-warning btn-sm" onclick="editItem('${item.id}')">
              <span class="material-icons">edit</span>
            </button>
            <button class="btn btn-outline-danger btn-sm" onclick="deleteItem('${item.id}')">
              <span class="material-icons">delete</span>
            </button>
          </div>
        `;
            container.appendChild(card);
        });
    }

    async function deleteItem(id) {
        if (!confirm("Are you sure you want to delete this entry?")) return;

        await fetch(`/api/history/${id}`, { method: 'DELETE' });
        loadHistory();
    }

    async function editItem(id) {
        const newBarcode = prompt("Enter new barcode:");
        if (!newBarcode) return;

        const isOriginal = confirm("Is this product original?");
        const country = prompt("Enter country of origin:");
        const checkedAt = new Date().toISOString();

        await fetch(`/api/history/${id}`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ barcode: newBarcode, is_original: isOriginal, country, checked_at: checkedAt })
        });

        loadHistory();
    }

    async function extractBarcode() {
        const fileInput = document.getElementById('imageInput');
        if (fileInput.files.length === 0) {
            alert("Please upload an image first");
            return;
        }

        const image = fileInput.files[0];
        const reader = new FileReader();
        reader.onload = async function () {
            const result = await Tesseract.recognize(reader.result, 'eng');
            const text = result.data.text.replace(/\D/g, '');
            document.getElementById('barcodeInput').value = text.slice(0, 13);
            checkProduct(text.slice(0, 13));
        };
        reader.readAsDataURL(image);
    }

    window.onload = loadHistory;
</script>
</body>
</html>
